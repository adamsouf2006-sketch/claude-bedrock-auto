name: Claude Auto Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Tache pour Claude"
        required: true
        default: "Analyse le code et propose des corrections"

jobs:
  claude-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Installer Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Lancer Claude
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ANTHROPIC_MODEL: "anthropic.claude-sonnet-4-20250514"
        run: claude -p "${{ github.event.inputs.task }}"
      - name: Commit
        if: always()
        run: |
          git config --global user.name "Claude Bot"
          git config --global user.email "claude-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Claude: auto"
          git push || echo "Pas de changements"
