name: Claude Auto Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Tache pour Claude"
        required: true
        default: "Analyse le code et propose des corrections"
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude-task:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          model: "anthropic.claude-sonnet-4-6"
          prompt: |
            ${{ github.event_name == 'issue_comment' && github.event.comment.body || github.event_name == 'issues' && format('{0}: {1}', github.event.issue.title, github.event.issue.body) || github.event.inputs.task }}
          claude_args: "--max-turns 25"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
