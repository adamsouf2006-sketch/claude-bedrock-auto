name: Claude Auto Agent
'on':
  workflow_dispatch:
    inputs:
      task:
        description: Tache pour Claude
        required: true
        default: Analyse le code et propose des corrections
  issue_comment:
    types:
    - created
  issues:
    types:
    - opened
jobs:
  claude-task:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issue_comment'
      && contains(github.event.comment.body, '@claude')) || (github.event_name ==
      'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Installer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Installer Claude Code
      run: npm install -g @anthropic-ai/claude-code
    - name: Lancer Claude
      env:
        CLAUDE_CODE_USE_BEDROCK: '1'
        ANTHROPIC_MODEL: anthropic.claude-sonnet-4-6
        AWS_REGION: us-east-1
      run: "if [ \"${{ github.event_name }}\" = \"issue_comment\" ]; then\n  PROMPT=\"\
        ${{ github.event.comment.body }}\"\nelif [ \"${{ github.event_name }}\" =\
        \ \"issues\" ]; then\n  PROMPT=\"${{ github.event.issue.title }}: ${{ github.event.issue.body\
        \ }}\"\nelse\n  PROMPT=\"${{ github.event.inputs.task }}\"\nfi\nclaude -p\
        \ \"$PROMPT\" --max-turns 25 --allowedTools \"Bash,Read,Write,Edit,Glob,Grep\"\
        \ | tee /tmp/claude_response.txt\n"
    - name: Comment on issue
      if: always() && (github.event_name == 'issue_comment' || github.event_name ==
        'issues')
      uses: actions/github-script@v7
      with:
        script: "const fs = require('fs');\nlet body = 'Claude a termine la tache.';\n\
          try {\n  body = fs.readFileSync('/tmp/claude_response.txt', 'utf8');\n \
          \ if (body.length > 60000) body = body.substring(0, 60000);\n} catch(e)\
          \ {}\nawait github.rest.issues.createComment({\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  issue_number: context.issue.number,\n  body:\
          \ '**Claude Bot:**\\n\\n' + body\n});\n"
    - name: Commit
      if: always()
      run: 'git config --global user.name "Claude Bot"

        git config --global user.email "claude-bot@users.noreply.github.com"

        git add -A

        git diff --cached --quiet || git commit -m "Claude: auto"

        git push || echo "Pas de changements"

        '
